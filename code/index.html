<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Latest news and trends from the world of coffee.">
    <title>The Daily Grind | Coffee News</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="logo">The Daily Grind</h1>
            <nav>
                <ul>
                    <li><a href="#latest">Latest</a></li>
                    <li><a href="#trends">Trends</a></li>
                    <li><a href="#brewing">Brewing Guides</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h2>Freshly Brewed News</h2>
            <p>Your daily dose of coffee culture, industry insights, and barista tips.</p>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search news (e.g., espresso)...">
                <button id="search-button">Search</button>
            </div>
        </section>

        <section id="news-grid" class="news-grid">
            <!-- This area will be populated by the API -->
            <div class="spinner"></div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2023 The Daily Grind. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
